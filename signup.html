<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SkillStack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">SkillStack</div>
      <div class="auth-subtitle">Create your free account and start learning today.</div>

      <h2>Sign Up</h2>
      <p class="auth-subtitle" style="margin-bottom:1.5rem;"></p>

      <div id="signupSuccess" style="display:none;background:rgba(76,175,80,0.1);border:1px solid #4caf50;border-radius:6px;padding:0.9rem 1rem;color:#4caf50;margin-bottom:1rem;font-size:0.88rem;">
        ✅ Account created! Redirecting to login...
      </div>

      <div class="form-group">
        <label for="spName">Full Name</label>
        <input type="text" id="spName" placeholder="Your full name">
        <span class="error-msg" id="spNameErr"></span>
      </div>

      <div class="form-group">
        <label for="spEmail">Email Address</label>
        <input type="email" id="spEmail" placeholder="you@email.com">
        <span class="error-msg" id="spEmailErr"></span>
      </div>

      <div class="form-group">
        <label for="spUser">Username</label>
        <input type="text" id="spUser" placeholder="Choose a username">
        <span class="error-msg" id="spUserErr"></span>
      </div>

      <div class="form-group">
        <label for="spPw">Password</label>
        <div class="password-wrap">
          <input type="password" id="spPw" placeholder="Create a password">
          <button class="toggle-pw" type="button" onclick="togglePw('spPw', this)">👁</button>
        </div>
        <span class="error-msg" id="spPwErr"></span>
      </div>

      <div class="form-group">
        <label for="spConfirm">Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="spConfirm" placeholder="Repeat your password">
          <button class="toggle-pw" type="button" onclick="togglePw('spConfirm', this)">👁</button>
        </div>
        <span class="error-msg" id="spConfirmErr"></span>
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="validateSignup()">Create Account</button>

      <div class="switch-link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
