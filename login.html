<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SkillStack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">SkillStack</div>
      <div class="auth-subtitle">Welcome back! Please login to continue.</div>

      <h2>Login</h2>
      <p class="auth-subtitle" style="margin-bottom:1.5rem;"></p>

      <div id="loginSuccess" style="display:none;background:rgba(76,175,80,0.1);border:1px solid #4caf50;border-radius:6px;padding:0.9rem 1rem;color:#4caf50;margin-bottom:1rem;font-size:0.88rem;">
        ✅ Login successful! Redirecting...
      </div>

      <div class="form-group">
        <label for="loginUser">Username or Email</label>
        <input type="text" id="loginUser" placeholder="Enter your username or email">
        <span class="error-msg" id="loginUserErr"></span>
      </div>

      <div class="form-group">
        <label for="loginPw">Password</label>
        <div class="password-wrap">
          <input type="password" id="loginPw" placeholder="Enter your password">
          <button class="toggle-pw" type="button" onclick="togglePw('loginPw', this)">👁</button>
        </div>
        <span class="error-msg" id="loginPwErr"></span>
      </div>

      <div style="text-align:right;margin-top:-0.5rem;margin-bottom:1.2rem;">
        <a href="#" style="font-size:0.82rem;color:var(--orange);">Forgot password?</a>
      </div>

      <button class="btn btn-primary btn-full btn-lg" onclick="validateLogin()">Login</button>

      <div class="switch-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
